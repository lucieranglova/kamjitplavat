name: Nightly scrape + deploy

on:
  schedule:
    # Každou noc ve 23:00 SEČ (21:00 UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:  # Možnost spustit ručně z GitHub UI

permissions:
  contents: write   # Potřeba pro commit + push do repozitáře
  pages: write
  id-token: write

jobs:
  scrape:
    name: Scrape lane data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scrapers
        run: |
          # Najdi run_all.py kdekoliv v repozitáři
          SCRIPT=$(find . -name "runall.py" | head -1)
          if [ -z "$SCRIPT" ]; then
            echo "ERROR: run_all.py not found"
            find . -name "*.py" | head -20
            exit 2
          fi
          echo "Found: $SCRIPT"
          python "$SCRIPT"
        continue-on-error: true

      - name: Commit updated lanes.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          LANES=$(find . -name "lanes.json" | head -1)
          if [ -n "$LANES" ]; then
            git add "$LANES"
          fi
          git diff --cached --quiet || git commit -m "chore: update lanes data $(date +'%Y-%m-%d')"
          git push

  deploy:
    name: Deploy to GitHub Pages
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main   # Po commitu scraperů

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Celý root repozitáře = index.html + data/ + style.css + script.js

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
